version: "3.8"

services:
  openclaw:
    image: openclaw/latest
    container_name: smartlearn-openclaw
    ports:
      - "8000:8000"
    volumes:
      - ./openclaw-plugins:/openclaw/plugins
    environment:
      MODEL: ${MODEL:-deepseek-v3}
      DB_URL: mongodb://db:27017/smartlearn
    depends_on:
      - db

  db:
    image: mongo:7
    container_name: smartlearn-mongo
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db

  pwa:
    build:
      context: ./pwa-frontend
      dockerfile: Dockerfile
    container_name: smartlearn-pwa
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_OPENCLAW_API_URL: ${NEXT_PUBLIC_OPENCLAW_API_URL:-http://localhost:8000}
    depends_on:
      - openclaw

volumes:
  db-data:
