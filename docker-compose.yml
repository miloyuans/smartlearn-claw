version: "3.8"

services:
  openclaw:
    build:
      context: ./openclaw-adapter
      dockerfile: Dockerfile
    container_name: smartlearn-openclaw
    ports:
      - "8000:8000"
    environment:
      DB_URL: ${DB_URL:-mongodb://db:27017/smartlearn}
      DB_NAME: ${DB_NAME:-smartlearn}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXP_MINUTES: ${JWT_EXP_MINUTES:-10080}
      PLUGIN_DIR: /plugins
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - ./openclaw-plugins:/plugins
      - ./openclaw-adapter/data:/data
    depends_on:
      - db

  db:
    image: mongo:7
    container_name: smartlearn-mongo
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db

  pwa:
    build:
      context: ./pwa-frontend
      dockerfile: Dockerfile
    container_name: smartlearn-pwa
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_OPENCLAW_API_URL: ${NEXT_PUBLIC_OPENCLAW_API_URL:-http://localhost:8000}
    depends_on:
      - openclaw

volumes:
  db-data:



